inputs:
  - name: start
    mode: edge
  - name: stop
    mode: edge
  - name: timeout
    mode: edge
  - name: door_closed
    mode: level

initial: idle

states:
  idle:
    transitions:
      - when: [start, door_closed]
        to: running
        actions:
          - run:
              action: begin_cycle
          - schedule:
              id: cycle_timeout
              after: 40ms
              emit: timeout

  running:
    transitions:
      - when: [stop]
        to: idle
        actions:
          - cancel:
              id: cycle_timeout
          - run:
              action: stop_cycle

      - when: [timeout]
        to: fault
        actions:
          - run:
              action: notify_timeout
              with:
                message: cycle took too long

  fault:
    transitions:
      - when: [stop]
        to: idle
        actions:
          - run:
              action: clear_fault
