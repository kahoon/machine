inputs:
  - name: login
    mode: edge
  - name: logout
    mode: edge
  - name: mfa_passed
    mode: edge
  - name: mfa_failed
    mode: edge
  - name: suspicious_activity
    mode: edge
  - name: mfa_timeout
    mode: edge
  - name: idle_timeout
    mode: edge
  - name: lockout_expired
    mode: edge
  - name: trusted_device
    mode: level
  - name: geo_risk
    mode: level
  - name: admin_user
    mode: level

initial: signed_out

states:
  signed_out:
    transitions:
      - when: [login, geo_risk]
        to: challenged
        actions:
          - run:
              action: prompt_mfa
              with:
                reason: geo risk
          - run:
              action: alert_security
              with:
                message: geo risk login requires MFA
          - schedule:
              id: mfa_window
              after: 40ms
              emit: mfa_timeout

      - when: [login, admin_user]
        to: challenged
        actions:
          - run:
              action: prompt_mfa
              with:
                reason: admin login
          - schedule:
              id: mfa_window
              after: 40ms
              emit: mfa_timeout

      - when: [login, trusted_device]
        to: active
        actions:
          - run:
              action: issue_session
              with:
                label: trusted fast path
          - schedule:
              id: idle_window
              after: 60ms
              emit: idle_timeout

      - when: [login]
        to: active
        actions:
          - run:
              action: issue_session
              with:
                label: standard login
          - schedule:
              id: idle_window
              after: 60ms
              emit: idle_timeout

  challenged:
    transitions:
      - when: [mfa_passed]
        to: active
        actions:
          - cancel:
              id: mfa_window
          - run:
              action: issue_session
              with:
                label: MFA passed
          - schedule:
              id: idle_window
              after: 60ms
              emit: idle_timeout

      - when: [mfa_failed]
        to: locked
        actions:
          - cancel:
              id: mfa_window
          - run:
              action: lock_account
              with:
                reason: MFA failed
          - schedule:
              id: lockout_window
              after: 50ms
              emit: lockout_expired

      - when: [mfa_timeout]
        to: locked
        actions:
          - run:
              action: lock_account
              with:
                reason: MFA timeout
          - schedule:
              id: lockout_window
              after: 50ms
              emit: lockout_expired

  active:
    transitions:
      - when: [suspicious_activity]
        to: challenged
        actions:
          - cancel:
              id: idle_window
          - run:
              action: prompt_mfa
              with:
                reason: suspicious activity
          - run:
              action: alert_security
              with:
                message: session stepped up after suspicious activity
          - schedule:
              id: mfa_window
              after: 40ms
              emit: mfa_timeout

      - when: [logout]
        to: signed_out
        actions:
          - cancel:
              id: idle_window
          - run:
              action: revoke_session
              with:
                reason: user logout

      - when: [idle_timeout]
        to: signed_out
        actions:
          - run:
              action: revoke_session
              with:
                reason: idle timeout

  locked:
    transitions:
      - when: [lockout_expired]
        to: signed_out
        actions:
          - run:
              action: clear_lockout
